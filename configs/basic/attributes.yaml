# 角色基础属性配置
# 这个文件定义了游戏中的角色基础属性系统

# 属性定义
attributes:
  # 基础属性
  strength:
    name: "力量哈哈"
    description: "影响物理攻击力和负重能力"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.5  # 每级增长系数

  dexterity:
    name: "敏捷"
    description: "影响攻击速度、闪避率和命中率"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.3

  constitution:
    name: "体质"
    description: "影响生命值和物理防御"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.4

  intelligence:
    name: "智力"
    description: "影响法术攻击力和法力值"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.5

  wisdom:
    name: "智慧"
    description: "影响法术防御和法力恢复速度"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.2

  charisma:
    name: "魅力"
    description: "影响社交互动和NPC反应"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.1

  weapon_proficiency:
    name: "武器熟练度"
    description: "影响使用各种武器的效果和伤害"
    min_value: 1
    max_value: 100
    default_value: 10
    growth_rate: 1.2

# 属性计算公式
formulas:
  # 生命值计算
  health:
    base: 100
    formula: "base + (constitution * 10) + (level * 5)"

  # 法力值计算
  mana:
    base: 50
    formula: "base + (intelligence * 8) + (level * 3)"

  # 物理攻击力计算
  physical_attack:
    base: 5
    formula: "base + (strength * 2) + (level * 1)"

  # 法术攻击力计算
  magical_attack:
    base: 5
    formula: "base + (intelligence * 2) + (level * 1)"

  # 物理防御计算
  physical_defense:
    base: 5
    formula: "base + (constitution * 1.5) + (level * 0.8)"

  # 法术防御计算
  magical_defense:
    base: 5
    formula: "base + (wisdom * 1.5) + (level * 0.8)"

  # 命中率计算
  hit_rate:
    base: 0.85
    formula: "min(0.95, base + (dexterity * 0.002) + (level * 0.001))"

  # 闪避率计算
  dodge_rate:
    base: 0.05
    formula: "min(0.5, base + (dexterity * 0.003) + (level * 0.002))"

  # 暴击率计算
  critical_rate:
    base: 0.05
    formula: "min(0.8, base + (dexterity * 0.001) + (level * 0.001))"

  # 暴击伤害计算
  critical_damage:
    base: 1.5
    formula: "base + (strength * 0.01) + (level * 0.005)"

# 恢复率配置
recovery_rates:
  # 生命值恢复率（每分钟恢复最大生命值的百分比）
  hp_recovery_rate: 0.05
  # 法力值恢复率（每分钟恢复最大法力值的百分比）
  mana_recovery_rate: 0.1

# 属性点分配系统
attribute_points:
  # 初始属性点
  initial_points: 20

  # 每级获得的属性点
  points_per_level: 3

  # 属性点消耗（每点属性需要的属性点数）
  cost_per_point:
    1-10: 1
    11-20: 2
    21-30: 3
    31-40: 4
    41-50: 5
    51-60: 6
    61-70: 8
    71-80: 10
    81-90: 13
    91-100: 16

# 种族属性修正
race_modifiers:
  human:
    name: "人类"
    description: "均衡发展的种族，无特殊属性修正"
    modifiers: {}

  elf:
    name: "精灵"
    description: "敏捷和智力出众，但体质较弱"
    modifiers:
      dexterity: 1.2
      intelligence: 1.2
      constitution: 0.9

  dwarf:
    name: "矮人"
    description: "强壮耐打，但敏捷不足"
    modifiers:
      strength: 1.2
      constitution: 1.2
      dexterity: 0.9

  orc:
    name: "兽人"
    description: "力量强大，但智慧不足"
    modifiers:
      strength: 1.3
      wisdom: 0.8

  halfling:
    name: "半身人"
    description: "敏捷灵活，但力量较弱"
    modifiers:
      dexterity: 1.3
      strength: 0.8

  gnome:
    name: "侏儒"
    description: "智慧聪颖，但体质一般"
    modifiers:
      intelligence: 1.2
      wisdom: 1.1
      constitution: 0.9

# 职业属性修正
class_modifiers:
  warrior:
    name: "战士"
    description: "专精于近战物理攻击"
    primary_attribute: "strength"
    secondary_attribute: "constitution"
    modifiers:
      strength: 1.2
      constitution: 1.1
      intelligence: 0.8

  mage:
    name: "法师"
    description: "专精于远程魔法攻击"
    primary_attribute: "intelligence"
    secondary_attribute: "wisdom"
    modifiers:
      intelligence: 1.2
      wisdom: 1.1
      strength: 0.8

  ranger:
    name: "游侠"
    description: "擅长远程物理攻击和敏捷"
    primary_attribute: "dexterity"
    secondary_attribute: "strength"
    modifiers:
      dexterity: 1.2
      strength: 1.1
      intelligence: 0.9

  cleric:
    name: "牧师"
    description: "擅长治疗和辅助魔法"
    primary_attribute: "wisdom"
    secondary_attribute: "constitution"
    modifiers:
      wisdom: 1.2
      constitution: 1.1
      dexterity: 0.9

  rogue:
    name: "盗贼"
    description: "擅长潜行和暴击"
    primary_attribute: "dexterity"
    secondary_attribute: "charisma"
    modifiers:
      dexterity: 1.2
      charisma: 1.1
      strength: 0.8

  paladin:
    name: "圣骑士"
    description: "结合了战士和牧师的特点"
    primary_attribute: "strength"
    secondary_attribute: "wisdom"
    modifiers:
      strength: 1.1
      wisdom: 1.1
      constitution: 1.0