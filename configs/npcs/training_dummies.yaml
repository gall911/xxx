# 木人桩配置文件
# 这个文件定义了游戏中木人桩的属性和行为

training_dummies:
  # 基础木人桩
  basic:
    name: "木人桩"
    description: "一个坚实的木人桩，上面布满了练习留下的痕迹。"
    hp: 1000
    max_hp: 1000
    regen_rate: 50  # 每次心跳恢复50点HP
    rebuild_time: 5  # 被摧毁后重建时间（秒）

    # 木人桩的声音库
    hit_sounds:
      - "砰！"
      - "啪！"
      - "咚！"
      - "咔嚓！"
      - "砰砰！"
      - "噼啪！"
      - "咚咚！"
      - "砰啪！"
      - "咔！"
      - "啪嗒！"

    # 木人桩的回应语句
    hit_responses:
      - "木屑四溅！"
      - "木人桩震动了一下！"
      - "木人桩发出沉闷的响声！"
      - "木人桩摇晃了几下！"
      - "木人桩上的裂纹又多了一道！"
      - "木人桩微微颤抖！"
      - "木人桩发出吱呀声！"
      - "木人桩的表面凹陷了一块！"

    # 特殊回应（20%几率触发）
    special_responses:
      - "{attacker}的攻击让木人桩剧烈摇晃！"
      - "木屑从木人桩上飞溅而出！"
      - "木人桩发出不堪重负的呻吟声！"
      - "这一击似乎在木人桩上留下了新的痕迹！"

    # 被摧毁时的消息
    destroy_message: "{name}发出一声巨响，碎裂成了无数木屑！"

    # 重建时的消息
    rebuild_start_message: "{name}的碎片开始聚集，似乎要重新组合..."
    rebuild_complete_message: "{name}重新组合成形，恢复了原状！"

    # 从0HP恢复时的消息
    recover_from_zero_message: "{name}开始自行修复，裂纹逐渐消失..."

    # 完全恢复时的消息
    full_recover_message: "{name}已完全修复，看起来完好如初！"

  # 高级木人桩
  advanced:
    name: "玄铁木人桩"
    description: "一个由玄铁打造的坚固木人桩，表面闪烁着金属光泽。"
    hp: 5000
    max_hp: 5000
    regen_rate: 100  # 每次心跳恢复100点HP
    rebuild_time: 10  # 被摧毁后重建时间（秒）

    # 木人桩的声音库
    hit_sounds:
      - "铛！"
      - "锵！"
      - "叮！"
      - "铿锵！"
      - "铛铛！"
      - "锵锵！"
      - "叮叮！"
      - "铿！"
      - "锵叮！"
      - "铛锵锵！"

    # 木人桩的回应语句
    hit_responses:
      - "火花四溅！"
      - "玄铁木人桩发出清脆的金属声！"
      - "玄铁木人桩微微震动！"
      - "玄铁木人桩上出现了一道浅痕！"
      - "玄铁木人桩表面泛起一阵涟漪！"
      - "玄铁木人桩发出嗡鸣声！"
      - "玄铁木人桩闪烁着寒光！"
      - "玄铁木人桩表面泛起一层光晕！"

    # 特殊回应（20%几率触发）
    special_responses:
      - "{attacker}的攻击在玄铁木人桩上留下一道印记！"
      - "玄铁木人桩发出刺耳的金属摩擦声！"
      - "玄铁木人桩表面能量波动！"
      - "这一击让玄铁木人桩发出了震耳欲聋的轰鸣！"

    # 被摧毁时的消息
    destroy_message: "{name}发出一声巨响，碎裂成无数金属碎片！"

    # 重建时的消息
    rebuild_start_message: "{name}的碎片开始发光，似乎要重新组合..."
    rebuild_complete_message: "{name}重新组合成形，表面闪烁着玄铁的光泽！"

    # 从0HP恢复时的消息
    recover_from_zero_message: "{name}开始自行修复，裂纹逐渐消失，表面恢复光泽..."

    # 完全恢复时的消息
    full_recover_message: "{name}已完全修复，看起来完好如初，玄铁光泽流转！"

  # 大师级木人桩
  master:
    name: "灵木人桩"
    description: "一个由千年灵木打造的木人桩，表面刻满了神秘的符文，散发着淡淡的灵气。"
    hp: 10000
    max_hp: 10000
    regen_rate: 200  # 每次心跳恢复200点HP
    rebuild_time: 15  # 被摧毁后重建时间（秒）

    # 木人桩的声音库
    hit_sounds:
      - "嗡！"
      - "嗡嗡！"
      - "咻！"
      - "嗡鸣！"
      - "咻咻！"
      - "嗡嗡嗡！"
      - "灵气波动！"
      - "符文闪烁！"
      - "灵光乍现！"
      - "嗡然！"

    # 木人桩的回应语句
    hit_responses:
      - "灵气四溢！"
      - "灵木人桩上的符文闪烁了一下！"
      - "灵木人桩发出神秘的嗡鸣声！"
      - "灵木人桩表面泛起一阵灵光！"
      - "灵木人桩上的符文似乎活了过来！"
      - "灵木人桩微微震动，灵气流转！"
      - "灵木人桩发出悠长的嗡鸣！"
      - "灵木人桩表面符文光芒流转！"

    # 特殊回应（20%几率触发）
    special_responses:
      - "{attacker}的攻击让灵木人桩上的符文大放异彩！"
      - "灵木人桩发出一阵悦耳的嗡鸣，灵气四溢！"
      - "灵木人桩表面符文闪烁，似乎在吸收攻击的力量！"
      - "这一击让灵木人桩发出震耳欲聋的灵音！"

    # 被摧毁时的消息
    destroy_message: "{name}发出一声巨响，碎裂成无数灵光碎片！"

    # 重建时的消息
    rebuild_start_message: "{name}的灵光碎片开始汇聚，似乎要重新组合..."
    rebuild_complete_message: "{name}重新组合成形，表面符文闪烁，灵气四溢！"

    # 从0HP恢复时的消息
    recover_from_zero_message: "{name}开始自行修复，裂纹逐渐消失，符文重新亮起..."

    # 完全恢复时的消息
    full_recover_message: "{name}已完全修复，看起来完好如初，符文闪烁，灵气流转！"
