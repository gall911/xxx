# 高级YAML特性示例
# 展示YAML锚点、别名、多行文本和复杂嵌套结构的使用

# 使用锚点和别名避免重复定义
# 定义通用属性模板
attribute_templates: &base_template
  description: "基础属性"
  initial_value: 10
  growth_rate: 1.0
  max_value: 999

# 使用锚点和继承创建变体
strength_template: &strength_template
  <<: *base_template
  description: "影响物理攻击力和负重"
  growth_rate: 1.5

intelligence_template: &intelligence_template
  <<: *base_template
  description: "影响法术攻击力和法力值"
  growth_rate: 1.8

# 使用别名引用已定义的模板
primary_attributes:
  strength: *strength_template
  intelligence: *intelligence_template
  agility:
    <<: *base_template
    description: "影响攻击速度和闪避率"
    growth_rate: 1.2
  constitution:
    <<: *base_template
    description: "影响生命值和防御力"
    growth_rate: 1.3

# 多行文本示例
item_description: |
  这是一把传说中的神剑，
  由上古大能者以天外陨铁锻造而成。
  剑身刻有古老符文，
  挥舞时可引动天地之力。
  
  据说此剑曾斩杀过妖魔千万，
  剑刃至今仍残留着凛冽杀气。
  非有缘者不能驾驭。

# 折叠多行文本（保留换行但不保留末尾空行）
skill_description: >
  这是一个强大的法术，
  能够召唤陨石从天而降，
  对大范围内的敌人造成毁灭性打击。
  施法时间较长，需要持续引导。

# 复杂嵌套结构示例
character_creation:
  races:
    human:
      name: "人族"
      description: "均衡发展的种族，适应性强"
      stats:
        strength: 10
        agility: 10
        intelligence: 10
        constitution: 10
      available_classes:
        - "剑修"
        - "法修"
        - "体修"
      special_abilities:
        - "适应性强：经验获取速度提升10%"
        - "百折不挠：死亡损失降低20%"
        
    elf:
      name: "精灵族"
      description: "天生亲和自然，擅长法术"
      stats:
        strength: 8
        agility: 12
        intelligence: 14
        constitution: 8
      available_classes:
        - "法修"
        - "弓箭手"
        - "德鲁伊"
      special_abilities:
        - "自然亲和：植物类法术效果提升30%"
        - "优雅身姿：闪避率提升15%"
        
  classes:
    sword_master:
      name: "剑修"
      description: "以剑入道，追求极致的剑道"
      primary_attribute: "strength"
      secondary_attribute: "agility"
      skill_trees:
        basic:
          name: "基础剑法"
          skills:
            - id: "basic_slash"
              name: "基础斩击"
              description: "对敌人造成基础物理伤害"
              damage_formula: "strength * 1.2"
              mana_cost: 0
              cooldown: 0
            - id: "power_strike"
              name: "强力一击"
              description: "凝聚力量的一击，造成额外伤害"
              damage_formula: "strength * 2.0"
              mana_cost: 10
              cooldown: 5
        advanced:
          name: "进阶剑法"
          skills:
            - id: "sword_dance"
              name: "剑舞"
              description: "快速连续攻击，对敌人多次造成伤害"
              damage_formula: "strength * 0.8 * attack_count"
              mana_cost: 30
              cooldown: 10
              special_effects:
                - type: "multiple_attacks"
                  count: "3 + agility // 20"
                - type: "critical_chance_bonus"
                  value: 0.2

# 使用锚点和别名创建复杂对象模板
weapon_template: &weapon_base
  type: "equipment"
  slot: "weapon"
  rarity: "common"
  sell_price: 100
  durability: 100
  max_durability: 100

# 使用锚点和继承创建特定武器
legendary_sword:
  <<: *weapon_base
  name: "斩龙剑"
  description: |
    传说中曾斩杀恶龙的英雄之剑，
    剑身上仍残留着龙血的气息。
  rarity: "legendary"
  sell_price: 100000
  durability: 500
  max_durability: 500
  stats:
    attack: 200
    strength: 50
    critical_rate: 0.15
  special_effects:
    - type: "damage_bonus"
      target: "dragon_type"
      value: 0.5
    - type: "skill_enhancement"
      skill: "dragon_slayer"
      value: 2.0

# 使用锚点和别名创建复杂事件系统
event_template: &base_event
  type: "trigger"
  repeatable: false
  auto_trigger: false

random_encounter: &random_encounter
  <<: *base_event
  type: "random_encounter"
  chance: 0.1
  conditions:
    - type: "location"
      value: "wilderness"
    - type: "time"
      value: "night"

world_events:
  meteor_shower:
    <<: *random_encounter
    name: "流星雨"
    description: "天降流星，稀有矿物出现几率增加"
    duration: 300
    effects:
      - type: "resource_spawn_rate"
        resource: "rare_mineral"
        value: 5.0
      - type: "special_quest"
        quest: "collect_falling_stars"
        
  merchant_caravan:
    <<: *random_encounter
    name: "商队路过"
    description: "一支商队在此地扎营，提供稀有商品"
    duration: 600
    effects:
      - type: "special_npc"
        npc: "traveling_merchant"
      - type: "price_discount"
        category: "rare_items"
        value: 0.8
