# YAML高级特性示例
# 展示锚点、别名、多行文本、复杂嵌套等高级特性

# 使用锚点和别名避免重复定义
# 锚点定义: &anchor_name
# 别名引用: *anchor_name

# 基础怪物属性锚点
base_monster: &base_monster
  hp: 100
  mp: 50
  attack: 10
  defense: 5
  exp_reward: 20
  gold_reward: 10

# 使用继承和合并扩展基础属性
goblin:
  <<: *base_monster  # 继承基础属性
  name: "哥布林"
  description: |
    一种常见的小型怪物，
    通常成群出现，
    虽然个体不强但数量众多。
  hp: 80  # 覆盖继承的hp值
  attack: 8  # 覆盖继承的attack值
  skills:
    - "偷袭"
    - "群攻"
  drops:
    - "哥布林耳朵"
    - "粗糙的匕首"

orc:
  <<: *base_monster  # 继承基础属性
  name: "兽人"
  description: >
    比哥布林更强壮的怪物，
    拥有较高的攻击力和防御力，
    常作为小队的头领出现。
  hp: 150  # 覆盖继承的hp值
  mp: 30  # 覆盖继承的mp值
  attack: 15  # 覆盖继承的attack值
  defense: 10  # 覆盖继承的defense值
  exp_reward: 50  # 覆盖继承的exp_reward值
  gold_reward: 25  # 覆盖继承的gold_reward值
  skills:
    - "重击"
    - "咆哮"
    - "狂暴"
  drops:
    - "兽人牙齿"
    - "粗糙的斧头"
    - "兽皮护甲"

# 复杂嵌套结构示例
dungeon_templates:
  beginner_dungeon:
    name: "新手地下城"
    description: "适合初学者的地下城"
    difficulty: 1
    recommended_level: [1, 10]
    rooms:
      - &entrance_room  # 定义入口房间锚点
        id: "entrance"
        name: "入口大厅"
        description: "地下城的入口，光线昏暗"
        size: "medium"
        connections:
          - direction: "north"
            target: "corridor_1"
        monsters:
          - type: "goblin"
            count: [2, 4]
            respawn_time: 300
        items:
          - type: "potion"
            name: "治疗药水"
            chance: 0.3
            count: [1, 2]

      - &corridor_room  # 定义走廊房间锚点
        id: "corridor_1"
        name: "狭长走廊"
        description: "一条狭长的走廊，墙壁上有奇怪的划痕"
        size: "small"
        connections:
          - direction: "south"
            target: "entrance"
          - direction: "north"
            target: "junction_room"
        monsters:
          - type: "goblin"
            count: [1, 3]
            respawn_time: 300
        traps:
          - type: "spike_trap"
            damage: [5, 10]
            trigger_chance: 0.2

      - id: "junction_room"
        name: "岔路口"
        description: "三条道路交汇的地方"
        size: "medium"
        connections:
          - direction: "south"
            target: "corridor_1"
          - direction: "east"
            target: "treasure_room"
          - direction: "west"
            target: "boss_room"
        monsters:
          - type: "orc"
            count: 1
            respawn_time: 600

      - id: "treasure_room"
        name: "宝藏室"
        description: "一个堆满宝箱的房间"
        size: "small"
        connections:
          - direction: "west"
            target: "junction_room"
        items:
          - type: "weapon"
            name: "新手剑"
            chance: 0.5
            count: 1
          - type: "armor"
            name: "布甲"
            chance: 0.7
            count: 1
          - type: "gold"
            chance: 1.0
            count: [50, 100]

      - id: "boss_room"
        name: "首领房间"
        description: "一个宽敞的房间，中央站着强大的怪物"
        size: "large"
        connections:
          - direction: "east"
            target: "junction_room"
        monsters:
          - type: "orc_chieftain"
            count: 1
            respawn_time: 3600
            skills:
              - "强力重击"
              - "召唤小怪"
              - "狂怒"
        items:
          - type: "weapon"
            name: "兽人酋长斧"
            chance: 0.8
            count: 1
          - type: "armor"
            name: "兽人酋长铠"
            chance: 0.6
            count: 1
          - type: "quest_item"
            name: "兽人酋长徽章"
            chance: 1.0
            count: 1

# 高级地下城模板，复用基础房间
advanced_dungeon:
  name: "精英地下城"
  description: "适合高等级玩家的挑战"
  difficulty: 3
  recommended_level: [20, 30]
  rooms:
    - <<: *entrance_room  # 复用入口房间
      id: "advanced_entrance"  # 覆盖ID
      name: "幽暗入口"  # 覆盖名称
      description: "散发着不祥气息的入口"  # 覆盖描述
      monsters:  # 覆盖怪物
        - type: "shadow_beast"
          count: [3, 5]
          respawn_time: 180

    - <<: *corridor_room  # 复用走廊房间
      id: "dark_corridor"  # 覆盖ID
      name: "黑暗走廊"  # 覆盖名称
      description: "伸手不见五指的走廊，能听到远处传来的低语"  # 覆盖描述
      monsters:  # 覆盖怪物
        - type: "shadow_beast"
          count: [2, 4]
          respawn_time: 180
      traps:  # 覆盖陷阱
        - type: "poison_dart"
          damage: [10, 20]
          effect: "poison"
          duration: 30
          trigger_chance: 0.3
        - type: "teleport_trap"
          target: "trap_room"
          trigger_chance: 0.1

    - id: "trap_room"
      name: "陷阱室"
      description: "布满了各种陷阱的房间"
      size: "medium"
      connections:
        - direction: "north"
          target: "dark_corridor"
        - direction: "east"
          target: "puzzle_room"
      traps:
        - type: "spike_trap"
          damage: [15, 25]
          trigger_chance: 0.4
        - type: "poison_dart"
          damage: [10, 15]
          effect: "poison"
          duration: 20
          trigger_chance: 0.3
        - type: "fire_trap"
          damage: [20, 30]
          effect: "burn"
          duration: 10
          trigger_chance: 0.2

    - id: "puzzle_room"
      name: "谜题室"
      description: "需要解开谜题才能继续前进的房间"
      size: "large"
      connections:
        - direction: "west"
          target: "trap_room"
        - direction: "north"
          target: "boss_room"
      puzzle:
        type: "riddle"
        description: "一个古老的谜题，需要正确的答案才能打开通道"
        hints:
          - "答案与光明和黑暗有关"
          - "思考两者之间的平衡"
        solution: "twilight"
        reward:
          exp: 500
          items:
            - type: "key"
              name: "暗影之钥"
              count: 1

    - id: "boss_room"
      name: "暗影王座"
      description: "一个巨大的房间，中央有一个由阴影构成的王座"
      size: "huge"
      connections:
        - direction: "south"
          target: "puzzle_room"
      monsters:
        - type: "shadow_lord"
          count: 1
          respawn_time: 86400
          skills:
            - "暗影冲击"
            - "召唤暗影仆从"
            - "暗影形态"
            - "黑暗领域"
      items:
        - type: "weapon"
          name: "暗影之刃"
          chance: 0.7
          count: 1
          properties:
            - "shadow_damage"
            - "life_steal"
        - type: "armor"
          name: "暗影斗篷"
          chance: 0.6
          count: 1
          properties:
            - "stealth_bonus"
            - "shadow_resistance"
        - type: "accessory"
          name: "暗影核心"
          chance: 0.3
          count: 1
          properties:
            - "shadow_affinity"
            - "dark_vision"
