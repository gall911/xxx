
# 继承基础角色模板的所有属性，并覆盖部分属性
# === 境界系统 ===
realm: "qiCondensation" # 当前境界
level: 1               # 当前境界等级
title: "炼气期"        # 称号
exp: 0                 # 当前经验
expNeeded: 1000        # 下次升级所需经验

# === 基础四维 ===
soul: 20               # 魂力 - 影响法术威力
body: 15               # 体魄 - 影响生命防御
heart: 18              # 道心 - 影响突破几率
luck: 12               # 气运 - 影响机缘运气

# === 战斗属性 ===
HP: 150                # 当前生命值
maxHP: 150             # 生命值上限
MP: 100                # 当前法力值
maxMP: 100             # 法力值上限
attack: 25             # 攻击力
defense: 20            # 防御力
stamina: 150           # 当前体力值
maxStamina: 150        # 体力值上限

# === 战斗概率 ===
critRate: 0.08         # 暴击率
dodgeRate: 0.05        # 闪避率
hitRate: 0.97          # 命中率
speed: 120             # 速度

# === 元素抗性 ===
fireResist: 0.1        # 火抗
iceResist: 0.1         # 冰抗
thunderResist: 0.1     # 雷抗
poisonResist: 0.05      # 毒抗

# === 恢复速率 ===
HPRegen: 0.8           # 生命恢复/秒
MPRegen: 1.5           # 法力恢复/秒
staminaRegen: 1.2      # 体力恢复/秒

# === 战斗状态 ===
inBattle: false        # 是否在战斗中
effects: []            # 状态效果列表

# === 技能系统 ===
skills: ["basicAttack", "meditation"]  # 已学技能列表
skillSlots: ["basicAttack", "meditation", null, null]  # 技能栏

# === 资源物品 ===
stones: 500            # 灵石
pills: {}              # 丹药
materials: {}          # 材料

# === 进度系统 ===
age: 100               # 年龄
cultivationYears: 50   # 修为年数
breakthroughCount: 0   # 突破次数
meridianPoints: 10     # 经脉点

# === 修士特有属性 ===
characterType: "cultivator" # 角色类型标识
